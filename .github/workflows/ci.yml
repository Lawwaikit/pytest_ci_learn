name: Python CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: [ "main" ]

jobs:
  test-lint-coverage:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout Code
        uses: actions/checkout@v5

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Install project (editable)
      - name: Install project
        run: pip install -e .

      # 5. Run tests with coverage
      - name: Run tests with coverage
        run: |
          PYTHONPATH=. pytest --cov=app --cov-report=xml --cov-report=term

      # 6. Lint with flake8
      - name: Lint code
        run: flake8 app testcases --max-line-length=120

#      - name: Upload coverage to Codecov
#        uses: codecov/codecov-action@v4
#        with:
#          files: coverage.xml
#          fail_ci_if_error: true
#          token: ${{ secrets.CODECOV_TOKEN }}

  docker-build-push:
    if: startsWith(github.ref, 'refs/tags/')
    needs: test-lint-coverage
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Set up Docker Buildx (multi-platform build)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Generate image version tag
      - name: Generate version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "Detected Git Tag: $VERSION"
          elif [[ -n "${GITHUB_SHA}" ]]; then
            VERSION=$(echo "${GITHUB_SHA}" | cut -c1-7)
            echo "Using Commit SHA: $VERSION"
          else
            VERSION=$(date +'%Y%m%d%H%M%S')
            echo "Using timestamp: $VERSION"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/py_ci_demo:latest
            ${{ secrets.DOCKER_USERNAME }}/py_ci_demo:${{ env.VERSION }}