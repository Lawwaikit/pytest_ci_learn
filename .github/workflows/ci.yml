name: Python CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: [ "main" ]

jobs:
  test-lint-coverage:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 鎷夊彇浠ｇ爜
      - name: Checkout Code
        uses: actions/checkout@v5

      # 2. 璁剧疆Python鐜
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. 瀹夎渚濊禆
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 4. 瀹夎椤圭洰
      - name: Install project
        run: pip install -e .

      # 5. 杩愯娴嬭瘯
      - name: Run tests with coverage
        run: |
          PYTHONPATH=. pytest --cov=app --cov-report=xml --cov-report=term
        
      # 6. flake8妫€鏌?
      - name: Lint code
        run: flake8 app testcases --max-line-length=120

#      - name: Upload coverage to Codecov
#        uses: codecov/codecov-action@v4
#        with:
#          files: coverage.xml
#          fail_ci_if_error: true
#          token: ${{ secrets.CODECOV_TOKEN }}

  docker-build-push:
    needs: test-lint-coverage
    runs-on: ubuntu-latest
    steps:
      # 1. 鎷夊彇浠ｇ爜
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 鐧诲綍鍒癉ocker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      # 3. 璁剧疆 buildx锛堟敮鎸佸骞冲彴鏋勫缓锛?
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4.鐢熸垚闀滃儚鐗堟湰鍙?
      - name: Generate version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "妫€娴嬪埌 Git Tag: $VERSION"
          elif [[ -n "${GITHUB_SHA}" ]]; then
            VERSION=$(echo "${GITHUB_SHA}" | cut -c1-7)
            echo "浣跨敤 Commit SHA: $VERSION"
          else
            VERSION=$(date +'%Y%m%d%H%M%S')
            echo "浣跨敤 鏃堕棿鎴? $VERSION"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 鏋勫缓骞舵帹閫侀暅鍍?
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/py_ci_demo:latest
            ${{ secrets.DOCKER_USERNAME }}/py_ci_demo:${{ env.VERSION }}