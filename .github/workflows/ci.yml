name: Python CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

# Cancel superseded runs; only the latest commit keeps running
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: test-reporter needs checks:write
permissions:
  contents: read
  checks: write

jobs:
  test-lint-coverage:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout Code
        uses: actions/checkout@v7

      # 2. Setup Python (with pip cache)
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Install project (editable)
      - name: Install project
        run: pip install -e .

      # 5. Run tests with coverage + reports (junit/html/allure)
      - name: Run tests with coverage
        run: |
          PYTHONPATH=. pytest \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            --html=report.html --self-contained-html \
            --alluredir=allure-results \
            --junitxml=junit.xml

      # 6. Lint with flake8 (run even if tests failed)
      - name: Lint code
        if: always()
        run: flake8 app testcases --max-line-length=120

      # 7. Publish test results as a commit/PR check
      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Test Results
          path: junit.xml
          reporter: java-junit

      # 8. Upload reports as artifact (always, for debugging on failure)
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            coverage.xml
            htmlcov/
            report.html
            junit.xml
            allure-results/

  docker-build-push:
    if: startsWith(github.ref, 'refs/tags/')
    needs: test-lint-coverage
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout source code
      - name: Checkout code
        uses: actions/checkout@v7

      # 2. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Set up Docker Buildx (multi-platform build)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Generate image version tag
      - name: Generate version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "Detected Git Tag: $VERSION"
          elif [[ -n "${GITHUB_SHA}" ]]; then
            VERSION=$(echo "${GITHUB_SHA}" | cut -c1-7)
            echo "Using Commit SHA: $VERSION"
          else
            VERSION=$(date +'%Y%m%d%H%M%S')
            echo "Using timestamp: $VERSION"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/py_ci_demo:latest
            ${{ secrets.DOCKER_USERNAME }}/py_ci_demo:${{ env.VERSION }}