name: Python CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  test-lint-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install project
        run: pip install -e .

      - name: Run tests with coverage
        run: |
          PYTHONPATH=. pytest \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            --html=report.html --self-contained-html \
            --alluredir=allure-results \
            --junitxml=junit.xml

      - name: Lint (ruff check)
        if: always()
        run: ruff check .

      - name: Format check (ruff format)
        if: always()
        run: ruff format --check .

      - name: Type check (mypy)
        if: always()
        run: mypy app

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Test Results
          path: junit.xml
          reporter: java-junit

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            coverage.xml
            htmlcov/
            report.html
            junit.xml
            allure-results/

  deploy-report:
    needs: test-lint-coverage
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download test reports
        uses: actions/download-artifact@v8
        with:
          name: test-reports
          path: reports

      - name: Setup Allure CLI
        run: npm install -g allure-commandline

      - name: Checkout gh-pages
        id: co
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: site
        continue-on-error: true

      - name: Init gh-pages if missing
        if: steps.co.outcome == 'failure'
        run: |
          mkdir -p site
          cd site
          git init -b gh-pages

      - name: Generate Allure report with history
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          mkdir -p reports/allure-results/history
          if [ -d site/history ]; then
            cp -r site/history/. reports/allure-results/history/
          fi
          allure generate reports/allure-results -o "site/$RUN_ID" --clean
          rm -rf site/history
          if [ -d "site/$RUN_ID/history" ]; then
            cp -r "site/$RUN_ID/history" site/history
          else
            mkdir -p site/history
          fi

      - name: Build index page
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          cd site
          {
            printf '<!DOCTYPE html>\n'
            printf '<html><head><meta charset="utf-8"><title>Allure Reports</title>\n'
            printf '<style>body{font-family:sans-serif;max-width:800px;margin:2rem auto;padding:0 1rem}a{color:#0969da}</style></head><body>\n'
            printf '<h1>Allure Test Reports</h1>\n'
            printf '<p>Latest build: <a href="%s/">%s</a></p>\n' "$RUN_ID" "$RUN_ID"
            printf '<h2>All builds</h2><ul>\n'
            for d in $(ls -1 | grep -E '^[0-9]+$' | sort -rn); do
              printf '<li><a href="%s/">Build %s</a></li>\n' "$d" "$d"
            done
            printf '</ul></body></html>\n'
          } > index.html

      - name: Publish to gh-pages
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy allure report $RUN_ID" || echo "nothing to commit"
          git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" HEAD:gh-pages

  docker-build-push:
    if: startsWith(github.ref, 'refs/tags/')
    needs: test-lint-coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "Detected Git Tag: $VERSION"
          elif [[ -n "${GITHUB_SHA}" ]]; then
            VERSION=$(echo "${GITHUB_SHA}" | cut -c1-7)
            echo "Using Commit SHA: $VERSION"
          else
            VERSION=$(date +'%Y%m%d%H%M%S')
            echo "Using timestamp: $VERSION"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/py_ci_demo:latest
            ${{ secrets.DOCKER_USERNAME }}/py_ci_demo:${{ env.VERSION }}